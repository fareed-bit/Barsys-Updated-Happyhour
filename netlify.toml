[build]
  publish = "."

# Security + cache headers for ALL origins
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Prevent the Netlify/Pages origin from being indexed — only barsys.com/corporate-happy-hours gets indexed
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect subdomain to canonical path on barsys.com
[[redirects]]
  from = "https://happyhours.barsys.com/*"
  to = "https://barsys.com/corporate-happy-hours"
  status = 301
  force = true

[[redirects]]
  from = "https://www.happyhours.barsys.com/*"
  to = "https://barsys.com/corporate-happy-hours"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
